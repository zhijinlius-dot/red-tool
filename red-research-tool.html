<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RED 競合リサーチツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;}
.app{max-width:900px;margin:0 auto;padding:24px 16px;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.logo{width:40px;height:40px;border-radius:10px;background:#FF2442;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;flex-shrink:0;}
.header-title{font-size:20px;font-weight:700;}
.header-sub{font-size:12px;color:#888;margin-top:2px;}
.tabs{display:flex;gap:0;background:white;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;margin-bottom:20px;width:fit-content;}
.tab{padding:10px 24px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;font-weight:500;}
.tab.active{background:#FF2442;color:white;}
.section{display:none;}
.section.active{display:block;}
.card{background:white;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:16px;}
.section-title{font-size:15px;font-weight:600;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.lbl{font-size:12px;color:#666;font-weight:500;}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:#FF2442;}
.btn{padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;border:none;}
.btn-primary{background:#FF2442;color:white;}
.btn-primary:hover{background:#e01f3a;}
.btn-primary:disabled{background:#fca5a5;cursor:not-allowed;}
.btn-outline{background:white;color:#1a1a1a;border:1px solid #e0e0e0;}
.btn-outline:hover{background:#f5f5f5;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #eee;border-top-color:#FF2442;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.chip{padding:5px 14px;font-size:12px;border:1px solid #e0e0e0;border-radius:20px;cursor:pointer;background:none;color:#666;}
.chip.active{background:#FF2442;color:white;border-color:#FF2442;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.candidate-card{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:14px;margin-bottom:10px;}
.candidate-name{font-size:14px;font-weight:600;margin-bottom:4px;}
.candidate-meta{font-size:12px;color:#888;margin-bottom:8px;}
.add-form{background:white;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-top:10px;display:none;}
.add-form.open{display:block;}
.link{color:#1a73e8;font-size:12px;text-decoration:none;}
.link:hover{text-decoration:underline;}
.search-bar{display:flex;gap:8px;margin-bottom:12px;}
.search-bar input{flex:1;}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px;}
.progress{height:4px;background:#eee;border-radius:2px;margin-top:10px;overflow:hidden;display:none;}
.progress-bar{height:100%;background:#FF2442;border-radius:2px;transition:width .3s;}
.tip{font-size:12px;color:#888;margin-top:8px;line-height:1.6;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #eee;background:#fafafa;white-space:nowrap;}
td{padding:11px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">R</div>
    <div>
      <div class="header-title">RED 競合リサーチツール</div>
      <div class="header-sub">日本人アカウント自動発見 · 小紅書 競合分析</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="go('search')">🔍 アカウント検索</button>
    <button class="tab" onclick="go('list')">📋 一覧 (<span id="list-cnt">0</span>)</button>
  </div>
  <div class="section active" id="s-search">
    <div class="card">
      <div class="section-title">ジャンルを入力してAIに競合を探させる</div>
      <div class="form-row">
        <div class="form-group">
          <label class="lbl">ジャンル・テーマ *</label>
          <input id="sg-genre" type="text" placeholder="例: ライフスタイル、美容、グルメ" />
        </div>
        <div class="form-group">
          <label class="lbl">フォロワー規模（目安）</label>
          <select id="sg-size">
            <option value="">指定なし</option>
            <option>1万以下（マイクロ）</option>
            <option>1万〜10万（ミドル）</option>
            <option>10万以上（大手）</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px;">
        <label class="lbl">追加条件（任意）</label>
        <input id="sg-note" type="text" placeholder="例: 日本在住、中国語と日本語混合、最近伸びている" />
      </div>
      <button class="btn btn-primary" id="btn-search" onclick="runSearch()">AIで競合を探す</button>
      <div class="progress" id="prog"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
      <p class="tip" id="search-tip"></p>
    </div>
    <div id="candidates"></div>
  </div>
  <div class="section" id="s-list">
    <div class="search-bar">
      <input type="text" id="q" placeholder="アカウント名・メモで検索..." oninput="renderTable()" />
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">CSVで出力</button>
    </div>
    <div class="filter-row" id="genre-chips"></div>
    <div class="card" style="padding:0;overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>#</th><th>アカウント名</th><th>ジャンル</th><th>フォロワー</th>
            <th>投稿数</th><th>いいね計</th><th>ENG率</th><th>特徴メモ</th><th>リンク</th><th></th>
          </tr>
        </thead>
        <tbody id="tbl"></tbody>
      </table>
      <div class="empty" id="empty-msg">まだ登録がありません。「アカウント検索」タブから追加してください。</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const GENRE_COLORS={'ライフスタイル':['#E1F5EE','#0F6E56'],'美容':['#FBEAF0','#993556'],'グルメ':['#FAEEDA','#854F0B'],'ファッション':['#EEEDFE','#534AB7'],'旅行':['#E6F1FB','#185FA5'],'フィットネス':['#EAF3DE','#3B6D11'],'その他':['#F1EFE8','#5F5E5A']};
let accounts=JSON.parse(localStorage.getItem('red_accounts')||'[]');
let activeGenre='all';
function saveAccounts(){localStorage.setItem('red_accounts',JSON.stringify(accounts));document.getElementById('list-cnt').textContent=accounts.length;}
function go(tab){['search','list'].forEach((t,i)=>{document.getElementById('s-'+t).classList.toggle('active',t===tab);document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);});if(tab==='list'){renderChips();renderTable();}}
function fmtN(n){if(!n&&n!==0)return'—';const v=parseFloat(String(n).replace(/[^0-9.]/g,''))||0;if(String(n).includes('万'))return String(n);if(v>=10000)return(v/10000).toFixed(1)+'万';if(v>0)return v.toLocaleString();return n||'—';}
function calcEng(f,l,p){const fv=parseFloat(String(f).replace(/[^0-9.]/g,''))||0,lv=parseFloat(String(l).replace(/[^0-9.]/g,''))||0,pv=parseFloat(String(p).replace(/[^0-9.]/g,''))||0;if(fv>0&&lv>0&&pv>0)return((lv/pv)/fv*100).toFixed(1)+'%';return'—';}
async function runSearch(){
  const genre=document.getElementById('sg-genre').value.trim();
  if(!genre){alert('ジャンルを入力してください');return;}
  const size=document.getElementById('sg-size').value;
  const note=document.getElementById('sg-note').value.trim();
  const btn=document.getElementById('btn-search');
  btn.disabled=true;btn.textContent='検索中...';
  document.getElementById('prog').style.display='block';
  document.getElementById('search-tip').textContent='AIがWebを検索して日本人REDアカウントを探しています...';
  document.getElementById('candidates').innerHTML='';
  let prog=0;
  const iv=setInterval(()=>{prog=Math.min(prog+6,85);document.getElementById('prog-bar').style.width=prog+'%';},400);
  const prompt=`あなたはREDの日本人インフルエンサーリサーチの専門家です。以下の条件で実際に活動している日本人のREDアカウントを10件探してリストアップしてください。ジャンル: ${genre} フォロワー規模: ${size||'指定なし'} 追加条件: ${note||'なし'} 必ず以下のJSON形式のみで回答してください。前置き・説明・マークダウン記号は一切不要です。[{"name":"アカウント名(@なし)","genre":"ジャンル","followers":"推定フォロワー数(数値のみ)","posts":"推定投稿数(数値のみ)","likes":"推定いいね総数(数値のみ)","memo":"特徴説明50文字以内","url":"REDプロフィールURL不明なら空","confidence":"high/medium/low"}]`;
  try{
    const res=await fetch('https://script.google.com/macros/s/AKfycbw7s2ielAS5YNVThj3DnJOKsocEdy6D3IlrVY2xrajF4GNNzTtmKsAzfwtOQguyL8c_/exec',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    clearInterval(iv);document.getElementById('prog-bar').style.width='100%';
    const text=data.content?.map(c=>c.text||'').filter(Boolean).join('');
    let parsed=[];
    try{const m=text.replace(/```json|```/g,'').match(/\[[\s\S]*\]/);if(m)parsed=JSON.parse(m[0]);}catch(e){}
    if(parsed.length===0){document.getElementById('candidates').innerHTML='<div class="card"><p style="font-size:13px;color:#888;">アカウントが見つかりませんでした。別のジャンルや条件で試してみてください。</p></div>';}
    else{renderCandidates(parsed,genre);document.getElementById('search-tip').textContent=parsed.length+'件のアカウントが見つかりました。確認して「追加」を押してください。';}
  }catch(e){clearInterval(iv);document.getElementById('candidates').innerHTML='<div class="card"><p style="color:#e53935;font-size:13px;">エラーが発生しました。もう一度お試しください。</p></div>';document.getElementById('search-tip').textContent='';}
  btn.disabled=false;btn.textContent='AIで競合を探す';
  setTimeout(()=>{document.getElementById('prog').style.display='none';document.getElementById('prog-bar').style.width='0%';},800);
}
function renderCandidates(list,genre){
  const confLabel={'high':'確度高','medium':'確度中','low':'確度低'};
  const confColor={'high':['#EAF3DE','#3B6D11'],'medium':['#FAEEDA','#854F0B'],'low':['#F1EFE8','#5F5E5A']};
  document.getElementById('candidates').innerHTML=list.map((a,i)=>{
    const [cbg,cfg]=confColor[a.confidence]||confColor['low'];
    const eng=calcEng(a.followers,a.likes,a.posts);
    return`<div class="candidate-card" id="cand-${i}"><div class="candidate-name">@${a.name||'不明'}</div><div class="candidate-meta">${a.followers?'👥 推定'+fmtN(a.followers)+'　':''}${a.posts?'📝 '+a.posts+'投稿　':''}${eng!=='—'?'💗 ENG '+eng+'　':''}<span class="badge" style="background:${cbg};color:${cfg};">${confLabel[a.confidence]||'確度低'}</span></div><div style="font-size:12px;color:#888;">${a.memo||''}</div><div style="display:flex;gap:8px;align-items:center;margin-top:10px;"><button class="btn btn-primary btn-sm" onclick="openForm(${i})">＋ 一覧に追加</button>${a.url?`<a class="link" href="${a.url}" target="_blank">REDで確認 →</a>`:''}<button class="btn btn-outline btn-sm" onclick="document.getElementById('cand-${i}').remove()">スキップ</button></div><div class="add-form" id="form-${i}"><div class="form-row" style="margin-bottom:8px;"><div class="form-group"><label class="lbl">アカウント名</label><input id="fn-${i}" value="${a.name||''}"/></div><div class="form-group"><label class="lbl">ジャンル</label><select id="fg-${i}">${['ライフスタイル','美容','グルメ','ファッション','旅行','フィットネス','その他'].map(g=>`<option${g===a.genre||g===genre?' selected':''}>${g}</option>`).join('')}</select></div></div><div class="form-row" style="margin-bottom:8px;"><div class="form-group"><label class="lbl">フォロワー数</label><input id="ff-${i}" value="${a.followers||''}" placeholder="例: 50000"/></div><div class="form-group"><label class="lbl">投稿数</label><input id="fp-${i}" value="${a.posts||''}" placeholder="例: 80"/></div></div><div class="form-row" style="margin-bottom:8px;"><div class="form-group"><label class="lbl">いいね総数</label><input id="fl-${i}" value="${a.likes||''}" placeholder="例: 120000"/></div><div class="form-group"><label class="lbl">URL</label><input id="fu-${i}" value="${a.url||''}" placeholder="https://..."/></div></div><div class="form-group" style="margin-bottom:10px;"><label class="lbl">特徴メモ</label><input id="fm-${i}" value="${a.memo||''}"/></div><div style="display:flex;gap:8px;"><button class="btn btn-primary btn-sm" onclick="saveCandidate(${i})">保存する</button><button class="btn btn-outline btn-sm" onclick="closeForm(${i})">キャンセル</button></div></div></div>`;
  }).join('');
}
function openForm(i){document.getElementById('form-'+i).classList.add('open');}
function closeForm(i){document.getElementById('form-'+i).classList.remove('open');}
function saveCandidate(i){
  const followers=document.getElementById('ff-'+i).value.trim(),posts=document.getElementById('fp-'+i).value.trim(),likes=document.getElementById('fl-'+i).value.trim();
  const acc={id:Date.now()+i,name:document.getElementById('fn-'+i).value.trim(),genre:document.getElementById('fg-'+i).value,followers,posts,likes,eng:calcEng(followers,likes,posts),url:document.getElementById('fu-'+i).value.trim(),memo:document.getElementById('fm-'+i).value.trim(),savedAt:new Date().toLocaleDateString('ja-JP')};
  if(!acc.name){alert('アカウント名を入力してください');return;}
  accounts.unshift(acc);saveAccounts();
  document.getElementById('cand-'+i).innerHTML=`<div style="font-size:13px;color:#2e7d32;padding:10px;background:#f1f8e9;border-radius:8px;">✓ @${acc.name} を一覧に追加しました</div>`;
  showToast('@'+acc.name+' を追加しました');
}
function renderChips(){const genres=['all',...new Set(accounts.map(a=>a.genre).filter(Boolean))];document.getElementById('genre-chips').innerHTML=genres.map(g=>`<button class="chip${g===activeGenre?' active':''}" onclick="setGenre('${g}',this)">${g==='all'?'すべて':g}</button>`).join('');}
function setGenre(g,btn){activeGenre=g;document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}
function renderTable(){
  const q=(document.getElementById('q')?.value||'').toLowerCase();
  const filtered=accounts.filter(a=>(!q||a.name.toLowerCase().includes(q)||(a.memo||'').toLowerCase().includes(q))&&(activeGenre==='all'||a.genre===activeGenre));
  const tbody=document.getElementById('tbl'),empty=document.getElementById('empty-msg');
  if(filtered.length===0){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=filtered.map((a,i)=>{const[bg,fg]=GENRE_COLORS[a.genre]||['#F1EFE8','#5F5E5A'];return`<tr><td style="color:#aaa;">${i+1}</td><td style="font-weight:600;white-space:nowrap;">@${a.name}</td><td><span class="badge" style="background:${bg};color:${fg};">${a.genre}</span></td><td>${fmtN(a.followers)}</td><td>${a.posts||'—'}</td><td>${fmtN(a.likes)}</td><td style="font-weight:600;color:${a.eng&&a.eng!=='—'?'#FF2442':'#aaa'};">${a.eng||'—'}</td><td style="max-width:180px;color:#666;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.memo||'—'}</td><td>${a.url?`<a class="link" href="${a.url}" target="_blank">開く →</a>`:'—'}</td><td><button style="color:#ccc;background:none;border:none;cursor:pointer;" onclick="del(${a.id})">✕</button></td></tr>`;}).join('');
}
function del(id){if(!confirm('削除しますか？'))return;accounts=accounts.filter(a=>a.id!==id);saveAccounts();renderChips();renderTable();}
function exportCSV(){if(accounts.length===0){alert('データがありません');return;}const header='アカウント名,ジャンル,フォロワー数,投稿数,いいね総数,ENG率,特徴メモ,URL,登録日';const rows=accounts.map(a=>[a.name,a.genre,a.followers,a.posts,a.likes,a.eng,a.memo,a.url,a.savedAt].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(','));const csv='\uFEFF'+header+'\n'+rows.join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='RED競合アカウント一覧.csv';a.click();URL.revokeObjectURL(url);showToast('CSVを出力しました');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
document.getElementById('list-cnt').textContent=accounts.length;
</script>
</body>
</html>
